<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vizyon 2027 | VİZYON AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050a0f;
  color: #e8f4f8;
  font-family: 'Courier New', monospace;
  cursor: none;
  overflow-x: hidden;
}
.cursor {
  width: 12px;
  height: 12px;
  background: #00d4ff;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  mix-blend-mode: screen;
}
.cursor-ring {
  width: 36px;
  height: 36px;
  border: 1px solid #00d4ff;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 99998;
  opacity: 0.5;
}
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: rgba(5,10,15,0.9);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
}
.logo {
  font-size: 24px;
  font-weight: bold;
  background: linear-gradient(45deg, #00d4ff, #ff6b35);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.btn {
  padding: 10px 20px;
  background: #00d4ff;
  color: #050a0f;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin-left: 10px;
}
.btn-outline {
  background: transparent;
  border: 1px solid #00d4ff;
  color: #00d4ff;
}
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 100px 20px;
}
.hero h1 {
  font-size: 64px;
  margin-bottom: 20px;
}
.hero p {
  font-size: 18px;
  color: #8ab4cc;
  max-width: 600px;
  margin-bottom: 30px;
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <div class="logo">VİZYON 2027</div>
  <div>
    <button class="btn btn-outline" onclick="alert('Yönetim paneli yakında!')">👑 FOUNDER</button>
    <button class="btn btn-outline" onclick="alert('Admin paneli yakında!')">⚙️ ADMIN</button>
    <button class="btn btn-outline" onclick="alert('Beta erişimi yakında!')">🔬 BETA</button>
    <button class="btn" onclick="alert('Giriş yap özelliği yakında!')">Giriş Yap</button>
    <button class="btn" onclick="alert('Kayıt ol özelliği yakında!')">Kayıt Ol</button>
  </div>
</nav>

<div class="hero">
  <h1>VİZYON AI</h1>
  <p>Süper yapay zeka ile kodlama devrimi. Her dilde kod yaz, web'de ara, dosyalarını analiz et.</p>
  <button class="btn" onclick="alert('VİZYON AI paneli açılıyor...')">⚡ VİZYON AI'ı Başlat</button>
</div>

<script>
// CURSOR
const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursorRing');
let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  cursor.style.left = (mouseX - 6) + 'px';
  cursor.style.top = (mouseY - 6) + 'px';
});

function animateRing() {
  ringX += (mouseX - ringX - 18) * 0.12;
  ringY += (mouseY - ringY - 18) * 0.12;
  cursorRing.style.left = ringX + 'px';
  cursorRing.style.top = ringY + 'px';
  requestAnimationFrame(animateRing);
}
animateRing();

// Buton hover efekti
document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('mouseenter', () => {
    cursor.style.transform = 'scale(2)';
    cursorRing.style.transform = 'scale(1.5)';
  });
  btn.addEventListener('mouseleave', () => {
    cursor.style.transform = 'scale(1)';
    cursorRing.style.transform = 'scale(1)';
  });
});

console.log('Site çalışıyor!');
</script>
</body>
</html>
